apiVersion: v1
kind: Namespace
metadata:
  name: village
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: village-chronicles
  namespace: village
  labels:
    app: village-chronicles
spec:
  replicas: 1
  selector:
    matchLabels:
      app: village-chronicles
  template:
    metadata:
      labels:
        app: village-chronicles
    spec:
      containers:
      - name: village-chronicles
        image: us-west1-docker.pkg.dev/snyk-cx-se-demo/ctf-images/village-chronicles:latest
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: village-chronicles-service
  namespace: village
  labels:
    app: village-chronicles
spec:
  selector:
    app: village-chronicles
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer